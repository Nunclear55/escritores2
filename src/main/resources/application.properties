spring.application.name=escritores

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/historias_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:3600}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
